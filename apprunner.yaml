version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.9
  command: streamlit run app.py --server.port 8080 --server.address 0.0.0.0
  network:
    port: 8080
    env: PORT
  env:
    - name: PORT
      value: "8080"
    - name: KNOWLEDGE_BASE_ID
      value: "D5MRCKWCTD"
    - name: DATA_SOURCE_ID
      value: "T4PVH55UXI"
    - name: S3_BUCKET
      value: "school-qa-docs-v2"
    - name: AWS_REGION
      value: "us-east-1"
